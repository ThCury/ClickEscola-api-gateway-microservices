# Plataforma Acadêmica — API Gateway + Microsserviços
# Regra de ouro: apenas o gateway (Nginx) e o Dozzle expõem portas para o host.
# Os serviços de aplicação só são acessíveis dentro da rede Docker "backend".

# Nome do projeto (NÃO depende do nome da pasta "code"). Isola este stack do
# docker de outros repositórios que também rodam a partir de uma pasta "code":
# a rede vira "clickescola_backend" e os volumes "clickescola_*".
name: clickescola

services:
  # ---------- Fundação: banco de dados ----------
  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    healthcheck:
      # Cassandra demora para aceitar conexões; só fica "healthy" quando o CQL responde.
      test: ["CMD-SHELL", "cqlsh -e 'describe keyspaces' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 60s
    volumes:
      - cassandra_data:/var/lib/cassandra
    networks:
      - backend

  # Container efêmero que carrega o schema e morre. Roda uma única vez.
  cassandra-init:
    image: cassandra:4.1
    container_name: cassandra-init
    depends_on:
      cassandra:
        condition: service_healthy
    volumes:
      - ./cassandra/init.cql:/init.cql:ro
    command: ["cqlsh", "cassandra", "-f", "/init.cql"]
    restart: "no"
    networks:
      - backend

  # ---------- Serviço de Alunos (FastAPI) ----------
  service-alunos:
    build: ./service-alunos
    container_name: service-alunos
    environment:
      CASSANDRA_HOSTS: cassandra
      CASSANDRA_PORT: "9042"
      CASSANDRA_KEYSPACE: alunos_ks
    depends_on:
      cassandra:
        condition: service_healthy
      cassandra-init:
        condition: service_completed_successfully
    networks:
      - backend
    # Sem "ports": acesso apenas interno (porta 8000 na rede Docker).

  # ---------- Serviço de Cursos (NestJS) ----------
  service-cursos:
    build: ./service-cursos
    container_name: service-cursos
    environment:
      CASSANDRA_HOSTS: cassandra
      CASSANDRA_PORT: "9042"
      CASSANDRA_KEYSPACE: cursos_ks
      CASSANDRA_DC: datacenter1
    depends_on:
      cassandra:
        condition: service_healthy
      cassandra-init:
        condition: service_completed_successfully
    networks:
      - backend
    # Sem "ports": acesso apenas interno (porta 3000 na rede Docker).

  # ---------- API Gateway (Nginx) ----------
  gateway:
    image: nginx:1.27-alpine
    container_name: gateway
    ports:
      - "8080:80" # ÚNICO ponto de entrada para o cliente.
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - service-alunos
      - service-cursos
    networks:
      - backend

  # ---------- Painel de administração (FastAPI + frontend) ----------
  # Lê o tracing do Cassandra, compara gateway x direto e dispara carga.
  service-admin:
    build: ./service-admin
    container_name: service-admin
    ports:
      - "8090:8090" # Painel do administrador: http://localhost:8090
    environment:
      CASSANDRA_HOSTS: cassandra
      CASSANDRA_PORT: "9042"
      TRACING_KEYSPACE: tracing_ks
      GATEWAY_URL: http://gateway
      ALUNOS_URL: http://service-alunos:8000
      CURSOS_URL: http://service-cursos:3000
      LOKI_URL: http://loki:3100
      GRAFANA_PUBLIC_URL: http://localhost:3001
      DOZZLE_PUBLIC_URL: http://localhost:9999
    depends_on:
      cassandra:
        condition: service_healthy
      cassandra-init:
        condition: service_completed_successfully
      loki:
        condition: service_started
    networks:
      - backend

  # ---------- Observabilidade 1: logs crus em tempo real ----------
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    ports:
      - "9999:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - backend

  # ---------- Observabilidade 2: dashboard de métricas do gateway ----------
  # Pipeline: Promtail lê os logs dos containers (Docker socket) -> Loki
  # armazena -> Grafana exibe latência, throughput e status em tempo real.
  loki:
    image: grafana/loki:2.9.8
    container_name: loki
    command: ["-config.file=/etc/loki/loki-config.yml"]
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    networks:
      - backend

  promtail:
    image: grafana/promtail:2.9.8
    container_name: promtail
    command: ["-config.file=/etc/promtail/promtail-config.yml"]
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    networks:
      - backend

  grafana:
    image: grafana/grafana:11.1.0
    container_name: grafana
    ports:
      - "3001:3000" # Dashboard do gateway: http://localhost:3001
    environment:
      # Sem login: abre direto no dashboard durante a apresentação.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_USERS_DEFAULT_THEME: dark
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - loki
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  cassandra_data:
  loki_data:
  grafana_data:
