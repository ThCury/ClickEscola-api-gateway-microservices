# Carrega os dashboards do diretório montado — aparecem prontos ao abrir o Grafana.
# folder: 'ClickEscola' -> os dois dashboards ficam agrupados na pasta ClickEscola.
apiVersion: 1

providers:
  - name: ClickEscola
    orgId: 1
    folder: 'ClickEscola'
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
