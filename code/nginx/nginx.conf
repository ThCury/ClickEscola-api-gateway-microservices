worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ---------- Log customizado: inclui tempo de resposta e tempo do upstream ----------
    # $request_time         = tempo total da requisição (cliente -> gateway -> upstream -> cliente)
    # $upstream_response_time = tempo gasto apenas pelo serviço de backend
    log_format gateway escape=json
        '{'
            '"time":"$time_iso8601",'
            '"request_id":"$request_id",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time",'
            '"upstream_addr":"$upstream_addr"'
        '}';

    access_log /var/log/nginx/access.log gateway;
    error_log  /var/log/nginx/error.log warn;

    # ---------- Rate limiting: eleva o gateway acima de um proxy simples ----------
    # 10 requisições por segundo por IP, com folga (burst) de 20.
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    # Requisições barradas pelo rate limit respondem 429 (Too Many Requests) —
    # status semântico e DISTINTO do 503 de "serviço fora do ar".
    limit_req_status 429;

    # ---------- Tratamento de erro: intercepta 5xx dos upstreams ----------
    proxy_intercept_errors on;

    # ---------- DNS do Docker: re-resolve os nomes dos serviços ----------
    # Sem isto o Nginx fixa o IP do serviço na subida; se o container é recriado
    # (IP muda), o gateway passa a devolver 503. Com o resolver + proxy_pass por
    # variável, o IP é re-resolvido (valid=10s) — resiliente a recriações e à
    # demo de "serviço cai e volta".
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name _;

        # Rastreabilidade: devolve ao cliente o ID gerado para a requisição.
        add_header X-Request-ID $request_id always;

        # Health check do próprio gateway.
        location = /health {
            default_type application/json;
            return 200 '{"status":"ok","gateway":"nginx"}';
        }

        # ---------- Roteamento: /api/alunos -> serviço de alunos ----------
        # O rewrite remove o prefixo /api/alunos e preserva o resto do caminho:
        #   /api/alunos          -> /alunos
        #   /api/alunos/{id}     -> /alunos/{id}
        # (proxy_pass SEM URI no final preserva a URI reescrita — evita a
        #  pegadinha clássica da barra final do Nginx.)
        location /api/alunos {
            limit_req zone=api_limit burst=20 nodelay;

            set $upstream_alunos service-alunos:8000;
            rewrite ^/api/alunos(/.*)?$ /alunos$1 break;
            proxy_pass http://$upstream_alunos;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID      $request_id;
            # Hora (epoch em segundos.milissegundos) em que o gateway recebeu a
            # requisição — o serviço usa isso para medir o salto gateway -> serviço.
            proxy_set_header X-Request-Start   $msec;
        }

        # ---------- Roteamento: /api/cursos -> serviço de cursos ----------
        location /api/cursos {
            limit_req zone=api_limit burst=20 nodelay;

            set $upstream_cursos service-cursos:3000;
            rewrite ^/api/cursos(/.*)?$ /cursos$1 break;
            proxy_pass http://$upstream_cursos;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID      $request_id;
            # Hora (epoch em segundos.milissegundos) em que o gateway recebeu a
            # requisição — o serviço usa isso para medir o salto gateway -> serviço.
            proxy_set_header X-Request-Start   $msec;
        }

        # ===================== Tratamento de erro NO GATEWAY =====================
        # O gateway é o responsável por traduzir falhas em respostas amigáveis,
        # protegendo o cliente (que nunca vê um erro cru do Nginx/serviço).

        # 1) Rate limit excedido -> 429 com mensagem clara e Retry-After.
        error_page 429 = @too_many_requests;
        location @too_many_requests {
            default_type application/json;
            add_header Retry-After 1 always;
            return 429 '{"error":"too_many_requests","mensagem":"Limite de 10 req/s excedido. Tente novamente em instantes.","status":429,"request_id":"$request_id"}';
        }

        # 2) Serviço interno indisponível (caiu, recusou conexão ou deu timeout):
        #    proxy_intercept_errors + error_page capturam 502/503/504 e devolvem
        #    um 503 JSON amigável — o gateway responde no lugar do serviço.
        error_page 502 503 504 = @service_unavailable;
        location @service_unavailable {
            default_type application/json;
            add_header Retry-After 2 always;
            return 503 '{"error":"service_unavailable","mensagem":"Servico interno temporariamente indisponivel. O gateway tratou a falha; tente novamente.","status":503,"request_id":"$request_id"}';
        }
    }
}
