worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ---------- Log customizado: inclui tempo de resposta e tempo do upstream ----------
    # $request_time         = tempo total da requisição (cliente -> gateway -> upstream -> cliente)
    # $upstream_response_time = tempo gasto apenas pelo serviço de backend
    log_format gateway escape=json
        '{'
            '"time":"$time_iso8601",'
            '"request_id":"$request_id",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time",'
            '"upstream_addr":"$upstream_addr"'
        '}';

    access_log /var/log/nginx/access.log gateway;
    error_log  /var/log/nginx/error.log warn;

    # ---------- Rate limiting: eleva o gateway acima de um proxy simples ----------
    # 10 requisições por segundo por IP, com folga (burst) de 20.
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # ---------- Tratamento de erro: intercepta 5xx dos upstreams ----------
    proxy_intercept_errors on;

    # ---------- Upstreams: resolvidos pelos nomes dos serviços na rede Docker ----------
    upstream alunos_upstream {
        server service-alunos:8000;
    }
    upstream cursos_upstream {
        server service-cursos:3000;
    }

    server {
        listen 80;
        server_name _;

        # Rastreabilidade: devolve ao cliente o ID gerado para a requisição.
        add_header X-Request-ID $request_id always;

        # Health check do próprio gateway.
        location = /health {
            default_type application/json;
            return 200 '{"status":"ok","gateway":"nginx"}';
        }

        # ---------- Roteamento: /api/alunos -> serviço de alunos ----------
        # O rewrite remove o prefixo /api/alunos e preserva o resto do caminho:
        #   /api/alunos          -> /alunos
        #   /api/alunos/{id}     -> /alunos/{id}
        # (proxy_pass SEM URI no final preserva a URI reescrita — evita a
        #  pegadinha clássica da barra final do Nginx.)
        location /api/alunos {
            limit_req zone=api_limit burst=20 nodelay;

            rewrite ^/api/alunos(/.*)?$ /alunos$1 break;
            proxy_pass http://alunos_upstream;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID      $request_id;
        }

        # ---------- Roteamento: /api/cursos -> serviço de cursos ----------
        location /api/cursos {
            limit_req zone=api_limit burst=20 nodelay;

            rewrite ^/api/cursos(/.*)?$ /cursos$1 break;
            proxy_pass http://cursos_upstream;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID      $request_id;
        }

        # ---------- Erro amigável em JSON quando um serviço cai ----------
        error_page 502 503 504 = @gateway_error;
        location @gateway_error {
            default_type application/json;
            return 503 '{"error":"servico temporariamente indisponivel","status":503,"request_id":"$request_id"}';
        }
    }
}
